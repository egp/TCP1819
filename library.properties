sentence=Software I2C library for arbitrary GPIO pins, bus scans, and common-device identification.
paragraph=TCP1819 provides a compact software-I2C API built around the BBI2C struct and functions such as I2CInit, I2CRead, I2CWrite, I2CScan, and I2CDiscoverDevice. It targets Arduino and Linux-style environments, supports caller-selected GPIO pins, and includes common-device identification helpers.
