sentence=Software I2C library for arbitrary GPIO pins, bus scans, common-device identification, and reusable host-test support.
paragraph=TCP1819 provides a compact software-I2C API built around the BBI2C struct and functions such as I2CInit, I2CRead, I2CWrite, I2CTest, I2CScan, and I2CDiscoverDevice. It targets Arduino and Linux-style environments, supports caller-selected GPIO pins, includes common-device identification helpers, and now also includes TCP1819-owned host-test scripted-bus support for reusable BBI2C-level testing.
